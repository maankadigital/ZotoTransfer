<body class="bg-pattern min-h-screen flex items-center justify-center p-sm antialiased font-body-md text-on-surface">
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-[24px] shadow-elevated border border-surface-variant overflow-hidden relative z-10">
<!-- Header -->
<div class="px-lg pt-lg pb-sm text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary-container text-on-primary-container mb-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="sync_alt">sync_alt</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-base">MyTransfer</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to continue to your workspace</p>
</div>
<!-- Form -->
<div class="px-lg pb-lg">
<form action="#" class="space-y-sm" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-[44px] pr-sm py-sm border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder:text-outline focus:ring-0 input-focus-ring transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-[44px] pr-sm py-sm border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder:text-outline focus:ring-0 input-focus-ring transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-base">
<button class="w-full flex justify-center items-center py-sm px-md border border-transparent rounded-[12px] shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform hover:-translate-y-[1px]" type="submit">
                        Sign In
                    </button>
</div>
</form>
<div class="mt-md">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-xs bg-surface-container-lowest text-outline font-label-sm text-label-sm uppercase tracking-wider">Or continue with</span>
</div>
</div>
<div class="mt-md">
<button class="w-full flex justify-center items-center py-sm px-md border border-outline-variant rounded-[12px] bg-surface-container-lowest font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors duration-200" type="button">
<svg class="h-5 w-5 mr-2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Google
                    </button>
</div>
</div>

                Don't have an account? 
                <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Create an account</a>
</p>
